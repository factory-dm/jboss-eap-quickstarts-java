name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - '[0-9]+.[0-9]+.x'  # Matches version branches like 8.0.x

# Only run the latest job for each PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  labeler:
    name: PR Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Label PR based on changed files
        uses: actions/labeler@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
      
      # Fallback manual labeling if no patterns match
      - name: Apply default labels
        if: success() || failure()
        uses: andymckay/labeler@master
        with:
          add-labels: "needs-review"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    needs: labeler
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: 'temurin'
          cache: 'maven'
      
      # Run a quick compilation to validate
      - name: Validate with Maven
        id: validation
        run: |
          mvn -B clean compile -DskipTests
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      # Check for specific files that should be included
      - name: Check for required files
        id: file_check
        run: |
          missing_files=""
          
          # Check if PR modifies Java files but doesn't update tests
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q "\.java$"; then
            if ! git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q "Test\.java$"; then
              missing_files="$missing_files\n- Test files should be updated when modifying Java code"
            fi
          fi
          
          # Check if PR modifies pom.xml but doesn't update README
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q "pom\.xml$"; then
            if ! git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q "README"; then
              missing_files="$missing_files\n- README should be updated when modifying pom.xml"
            fi
          fi
          
          if [ -n "$missing_files" ]; then
            echo "result=warning" >> $GITHUB_OUTPUT
            echo "missing=$missing_files" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
            echo "missing=" >> $GITHUB_OUTPUT
          fi

  comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      pull-requests: write
    if: always()
    
    steps:
      - name: Get validation results
        id: get_results
        run: |
          echo "validate_status=${{ needs.validate.result }}" >> $GITHUB_OUTPUT
      
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const validate_status = '${{ steps.get_results.outputs.validate_status }}';
            
            let body = '## Pull Request Validation Results\n\n';
            
            if (validate_status === 'success') {
              body += '✅ **Validation passed!** The changes in this PR compile successfully.\n\n';
            } else {
              body += '❌ **Validation failed!** Please check the build logs for details.\n\n';
            }
            
            body += '### Recommendations:\n';
            body += '- Ensure all tests pass before merging\n';
            body += '- Update documentation if you\'ve changed functionality\n';
            body += '- Consider adding examples for new features\n\n';
            
            body += 'This comment was automatically generated by the JBoss EAP Quickstarts CI system.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
