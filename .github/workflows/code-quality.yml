name: Code Quality

on:
  push:
    branches:
      - main
      - master
      - '[0-9]+.[0-9]+.x'  # Matches version branches like 8.0.x
  pull_request:
    branches:
      - main
      - master
      - '[0-9]+.[0-9]+.x'
  workflow_dispatch:  # Allow manual triggering

# Only run the latest job for each ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: 'temurin'
          cache: 'maven'  # Caches Maven dependencies

      # Run Checkstyle checks using the configuration in pom.xml
      - name: Run Checkstyle
        run: mvn -B checkstyle:check

      # Run SpotBugs analysis
      - name: Run SpotBugs
        run: |
          mvn -B com.github.spotbugs:spotbugs-maven-plugin:4.7.3.0:check \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Medium

      # Generate and publish the Checkstyle report as an artifact
      - name: Generate Checkstyle Report
        if: always()  # Run even if previous steps failed
        run: mvn -B checkstyle:checkstyle-aggregate

      # Upload Checkstyle reports
      - name: Upload Checkstyle Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: checkstyle-reports
          path: '**/target/checkstyle-result.xml'
          retention-days: 5

      # Upload SpotBugs reports
      - name: Upload SpotBugs Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: spotbugs-reports
          path: '**/target/spotbugsXml.xml'
          retention-days: 5
