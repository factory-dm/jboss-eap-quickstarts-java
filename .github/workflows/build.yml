name: JBoss EAP Quickstarts Build

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

# Only run the latest job for each ref
concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref || github.run_id }}'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build with Maven
      run: mvn -B clean install
      
    - name: Run Tests
      run: mvn -B test
      
    - name: Collect Test Results
      if: always()
      run: |
        mkdir -p test-results
        find . -type f -name "TEST-*.xml" -exec cp {} test-results/ \;
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: test-results
        
    - name: Collect Build Artifacts
      run: |
        mkdir -p artifacts
        find . -type f -name "*.war" -exec cp {} artifacts/ \;
        find . -type f -name "*.jar" -not -path "*/target/classes/*" -not -path "*/target/test-classes/*" -exec cp {} artifacts/ \;
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: artifacts
        retention-days: 5
