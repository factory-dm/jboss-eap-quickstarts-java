name: JBoss EAP Quickstarts Security Analysis

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

# Only run the latest job for each ref
concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref || github.run_id }}'
  cancel-in-progress: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for better security analysis
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    # OWASP Dependency Check
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'JBoss EAP Quickstarts'
        path: '.'
        format: 'HTML'
        out: 'dependency-check-reports'
        args: >
          --scan .
          --suppression ./.github/dependency-check-suppressions.xml
          --failOnCVSS 9
          --enableRetired
          
    - name: Upload Dependency Check Report
      uses: actions/upload-artifact@v3
      with:
        name: dependency-check-report
        path: dependency-check-reports
        
    # CodeQL Analysis
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: java
        
    - name: Build with Maven for CodeQL
      run: mvn -B compile
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:java"
        
    # Generate Security Summary Report
    - name: Generate Security Summary Report
      if: always()
      run: |
        echo "# Security Analysis Report" > security-report.md
        echo "## OWASP Dependency Check Results" >> security-report.md
        
        if [ -d "dependency-check-reports" ]; then
          echo "Dependency check completed. See the attached artifacts for detailed report." >> security-report.md
          
          # Extract high severity vulnerabilities if any
          if grep -q "CVSS score >= 7.0" dependency-check-reports/dependency-check-report.html; then
            echo "⚠️ **High severity vulnerabilities detected!** Please review the full report." >> security-report.md
          else
            echo "✅ No high severity vulnerabilities detected." >> security-report.md
          fi
        else
          echo "Dependency check did not generate a report." >> security-report.md
        fi
        
        echo "## CodeQL Analysis Results" >> security-report.md
        echo "CodeQL analysis completed. Results are available in the Security tab of the repository." >> security-report.md
        
    - name: Upload Security Summary Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-summary-report
        path: security-report.md
