# Spring Boot Configuration for Kitchensink Application
spring:
  application:
    name: kitchensink
  
  # Default profile
  profiles:
    active: dev
    
  # JPA / Hibernate Configuration
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        
  # Common datasource configuration
  datasource:
    driver-class-name: org.h2.Driver
    
# Server configuration
server:
  port: 8080
  servlet:
    context-path: /kitchensink
    
# Logging configuration
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
    org.jboss.as.quickstarts: INFO

---
# Development profile configuration
spring:
  config:
    activate:
      on-profile: dev
      
  # H2 Database configuration for development
  datasource:
    url: jdbc:h2:mem:kitchensinkdb;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    
  # H2 Console for development
  h2:
    console:
      enabled: true
      path: /h2-console
      
  # JPA configuration for development
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        
# Server port for development
server:
  port: 8080
  
# Logging configuration for development
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: DEBUG
    org.jboss.as.quickstarts: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

---
# Test profile configuration
spring:
  config:
    activate:
      on-profile: test
      
  # H2 Database configuration for testing
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    
  # JPA configuration for testing
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
      
# Server port for testing
server:
  port: 8081
  
# Logging configuration for testing
logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: INFO
    org.jboss.as.quickstarts: DEBUG

---
# Production profile configuration
spring:
  config:
    activate:
      on-profile: prod
      
  # H2 Database configuration for production
  # Note: In a real production environment, you would use a more robust database
  datasource:
    url: jdbc:h2:file:./kitchensinkdb;AUTO_SERVER=TRUE
    username: sa
    password: ${DB_PASSWORD:}
    
  # JPA configuration for production
  jpa:
    hibernate:
      ddl-auto: validate
      
  # Disable H2 Console in production
  h2:
    console:
      enabled: false
      
# Server port for production
server:
  port: ${PORT:8080}
  
# Logging configuration for production
logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN
    org.jboss.as.quickstarts: INFO
