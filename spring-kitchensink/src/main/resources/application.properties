# ===============================
# = DATA SOURCE
# ===============================
# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:kitchensinkdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# = JPA / HIBERNATE
# ===============================
# Show or not log for each sql query
spring.jpa.show-sql=true
# Hibernate ddl auto (create, create-drop, update): with "create-drop" the database
# schema will be automatically created afresh for every start of application
spring.jpa.hibernate.ddl-auto=create-drop
# Naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Allows Hibernate to generate SQL optimized for a particular DBMS
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Format SQL output
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = LOGGING
# ===============================
# Log levels for the application
logging.level.root=INFO
logging.level.com.example.kitchensink=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# = SERVER
# ===============================
# Server port
server.port=8080
# Application context path
server.servlet.context-path=/kitchensink

# ===============================
# = JACKSON
# ===============================
# Ensure proper serialization of entities
spring.jackson.serialization.fail-on-empty-beans=false
